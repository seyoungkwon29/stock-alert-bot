name: 🇰🇷 한국 주식 분석 (평일 오전 7시)

on:
  schedule:
    # 한국시간 평일 오전 7:00 = UTC 22:00 (전날)
    # UTC 기준 일~목 22:00 = KST 월~금 07:00
    - cron: "0 22 * * 0-4"
  workflow_dispatch:  # 수동 실행 가능

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create .env
        run: |
          cat <<EOF > .env
          KAKAO_REST_API_KEY=${{ secrets.KAKAO_REST_API_KEY }}
          KAKAO_REDIRECT_URI=${{ secrets.KAKAO_REDIRECT_URI }}
          KAKAO_ACCESS_TOKEN=${{ secrets.KAKAO_ACCESS_TOKEN }}
          KAKAO_REFRESH_TOKEN=${{ secrets.KAKAO_REFRESH_TOKEN }}
          EOF

      - name: Run Korean stock analysis
        run: python main.py --all --market kr

      - name: Update tokens if refreshed
        if: always()
        run: |
          if [ -f .env ]; then
            ACCESS=$(grep KAKAO_ACCESS_TOKEN .env | cut -d= -f2)
            REFRESH=$(grep KAKAO_REFRESH_TOKEN .env | cut -d= -f2)
            if [ -n "$ACCESS" ] && [ "$ACCESS" != "${{ secrets.KAKAO_ACCESS_TOKEN }}" ]; then
              echo "⚠️ 토큰이 갱신되었습니다. GitHub Secrets를 수동 업데이트 해주세요."
              echo "ACCESS_TOKEN=$ACCESS"
            fi
          fi
