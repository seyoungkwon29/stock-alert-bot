name: 🇰🇷 한국 주식 분석 (평일 오전 7시)

on:
  schedule:
    # 한국시간 평일 오전 7:00 = UTC 22:00 (전날)
    - cron: "0 22 * * 0-4"
  workflow_dispatch:

permissions:
  contents: write
  pages: write

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create .env
        run: |
          cat <<EOF > .env
          KAKAO_REST_API_KEY=${{ secrets.KAKAO_REST_API_KEY }}
          KAKAO_REDIRECT_URI=${{ secrets.KAKAO_REDIRECT_URI }}
          KAKAO_ACCESS_TOKEN=${{ secrets.KAKAO_ACCESS_TOKEN }}
          KAKAO_REFRESH_TOKEN=${{ secrets.KAKAO_REFRESH_TOKEN }}
          EOF

      - name: Run Korean stock analysis
        run: python main.py --all --market kr

      - name: Deploy reports to GitHub Pages
        run: |
          cd reports
          git init
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b gh-pages
          git add -A
          git commit -m "Update KR report $(date +%Y-%m-%d)"
          git push -f https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/seyoungkwon29/stock-alert-bot.git gh-pages
