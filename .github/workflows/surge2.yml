name: 🔥 급등주 2차 흐름 업데이트 (평일 오후 7시)

on:
  schedule:
    # 한국시간 평일 오후 6:30 = UTC 09:30
    # 6:30에 시작해서 7시까지 분석+전송 완료
    - cron: "30 9 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write
  pages: write

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create .env
        run: |
          cat <<EOF > .env
          KAKAO_REST_API_KEY=${{ secrets.KAKAO_REST_API_KEY }}
          KAKAO_REDIRECT_URI=${{ secrets.KAKAO_REDIRECT_URI }}
          KAKAO_ACCESS_TOKEN=${{ secrets.KAKAO_ACCESS_TOKEN }}
          KAKAO_REFRESH_TOKEN=${{ secrets.KAKAO_REFRESH_TOKEN }}
          EOF

      - name: Run surge screener phase 2
        run: python main.py --surge --surge-phase 2

      - name: Deploy reports to GitHub Pages
        run: |
          git clone --branch gh-pages --single-branch https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/seyoungkwon29/stock-alert-bot.git gh-pages-dir 2>/dev/null || mkdir gh-pages-dir
          cp reports/*.html gh-pages-dir/ 2>/dev/null || true
          cd gh-pages-dir
          git init 2>/dev/null || true
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b gh-pages 2>/dev/null || true
          git add -A
          git commit -m "Update surge2 report $(date +%Y-%m-%d)" || echo "No changes"
          git push -f https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/seyoungkwon29/stock-alert-bot.git gh-pages
