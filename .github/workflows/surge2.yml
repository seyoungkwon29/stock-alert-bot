name: 🔥 급등주(프리) 2차 (평일 오후 7시)

on:
  schedule:
    # 한국시간 평일 오후 6:30 = UTC 09:30
    - cron: "30 9 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write
  pages: write

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create .env
        run: |
          cat <<EOF > .env
          KAKAO_REST_API_KEY=${{ secrets.KAKAO_REST_API_KEY }}
          KAKAO_REDIRECT_URI=${{ secrets.KAKAO_REDIRECT_URI }}
          KAKAO_ACCESS_TOKEN=${{ secrets.KAKAO_ACCESS_TOKEN }}
          KAKAO_REFRESH_TOKEN=${{ secrets.KAKAO_REFRESH_TOKEN }}
          EOF

      - name: Restore previous slots
        run: |
          git clone --branch gh-pages --single-branch https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/seyoungkwon29/stock-alert-bot.git gh-pages-dir 2>/dev/null || mkdir gh-pages-dir
          mkdir -p reports
          cp gh-pages-dir/surge_pre_slots.json reports/ 2>/dev/null || true

      - name: Run premarket surge screener
        run: python main.py --surge-pre

      - name: Deploy reports to GitHub Pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bash .github/deploy.sh "Update surge-pre report $(date +%Y-%m-%d_%H%M)"
