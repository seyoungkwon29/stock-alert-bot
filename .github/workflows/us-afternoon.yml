name: 🇺🇸 미국 주식 분석 + 급등 후보 (평일 오후 5:30)

on:
  schedule:
    # 한국시간 평일 오후 5:30 = UTC 08:30
    - cron: "30 8 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write
  pages: write

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create .env
        run: |
          cat <<EOF > .env
          KAKAO_REST_API_KEY=${{ secrets.KAKAO_REST_API_KEY }}
          KAKAO_REDIRECT_URI=${{ secrets.KAKAO_REDIRECT_URI }}
          KAKAO_ACCESS_TOKEN=${{ secrets.KAKAO_ACCESS_TOKEN }}
          KAKAO_REFRESH_TOKEN=${{ secrets.KAKAO_REFRESH_TOKEN }}
          EOF

      - name: Run US stock analysis + surge screener
        run: python main.py --all --market us

      - name: Deploy reports to GitHub Pages
        run: |
          cd reports
          # 기존 gh-pages에서 kr.html 보존
          git init
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote add origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/seyoungkwon29/stock-alert-bot.git
          git fetch origin gh-pages || true
          git checkout -b gh-pages
          # 기존 KR 리포트가 있으면 가져오기
          git checkout origin/gh-pages -- kr.html 2>/dev/null || true
          git add -A
          git commit -m "Update US report $(date +%Y-%m-%d)"
          git push -f origin gh-pages
