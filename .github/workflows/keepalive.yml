name: ♻️ Keepalive (레포 활성 유지)

on:
  schedule:
    # 매주 수요일 UTC 00:00 (KST 09:00)
    - cron: "0 0 * * 3"

permissions:
  contents: write

jobs:
  keepalive:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Keep repo alive
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit --allow-empty -m "chore: keepalive $(date +%Y-%m-%d)"
          git push
