name: 🔥 급등주(본장) (평일 오후 11시)

on:
  schedule:
    # 한국시간 평일 오후 10:50 = UTC 13:50
    # 10:50에 분석 시작해서 11시까지 전송
    - cron: "50 13 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write
  pages: write

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create .env
        run: |
          cat <<EOF > .env
          KAKAO_REST_API_KEY=${{ secrets.KAKAO_REST_API_KEY }}
          KAKAO_REDIRECT_URI=${{ secrets.KAKAO_REDIRECT_URI }}
          KAKAO_ACCESS_TOKEN=${{ secrets.KAKAO_ACCESS_TOKEN }}
          KAKAO_REFRESH_TOKEN=${{ secrets.KAKAO_REFRESH_TOKEN }}
          EOF

      - name: Run intraday surge screener
        run: python main.py --surge-live

      - name: Deploy reports to GitHub Pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bash .github/deploy.sh "Update surge-live report $(date +%Y-%m-%d)"
